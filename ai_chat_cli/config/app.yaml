# ============ 应用通用配置 ============

# ============ 重试配置 ============
retry:
  max_retries: 3          # 最大重试次数
  retry_delay: 1.0        # 重试间隔（秒）

# ============ 工具调用 ============
# 三层防护防止无限循环：
#   1) 重复检测——连续 N 轮调用同一工具同一参数 → 终止
#   2) Token 预算——单次对话工具调用累计超限 → 终止
#   3) 兜底上限——轮次超过上限 → 终止（最终安全网）
tool:
  max_rounds: 20            # 单轮对话中工具调用最大循环轮次（兜底）
  stale_rounds: 3           # 连续相同工具+参数达到此值视为死循环
  max_tool_tokens: 100000   # 单次对话工具调用累计 Token 上限

# ============ 日志配置 ============
logging:
  show_timestamp: true    # 是否显示时间戳
  file: "logs/app.log"    # 日志文件路径

# ============ 文件操作沙箱 ============
workspace:
  dir: "workspace"          # 文件读写白名单目录（相对于用户数据目录 ~/.ai-chat-cli/）

# ============ 对话历史 ============
history:
  save_dir: "chat_history"  # 对话历史保存目录
